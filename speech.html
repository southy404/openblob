<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' ipc: http://ipc.localhost; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion Speech</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: visible;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .speech-shell {
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .speech-bubble {
        position: relative;
        max-width: 190px;
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 12px;
        line-height: 1.3;
        color: white;
        background: rgba(20, 24, 34, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .speech-bubble::after {
        content: "";
        position: absolute;
        bottom: -6px;
        left: 50%;
        width: 10px;
        height: 10px;
        background: rgba(20, 24, 34, 0.88);
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        transform: translateX(-50%) rotate(45deg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/speech.tsx"></script>
  </body>
</html>
