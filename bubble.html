<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' ipc: http://ipc.localhost; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion Bubble</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
      }

      body {
        user-select: none;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .bubble-shell {
        width: 100%;
        height: 100%;
        padding: 12px;
        background: transparent;
      }

      .bubble-card {
        width: 100%;
        height: 100%;
        border-radius: 24px;
        padding: 14px;
        background: rgba(7, 10, 18, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bubble-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .bubble-badge,
      .bubble-chip,
      .bubble-icon-button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
      }

      .bubble-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        color: rgba(255, 244, 196, 0.95);
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .bubble-icon-button {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .bubble-section {
        padding: 10px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .bubble-answer-section {
        flex: 1;
        min-height: 100px;
        display: flex;
        flex-direction: column;
      }

      .bubble-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.52);
        margin-bottom: 6px;
      }

      .bubble-input,
      .bubble-textarea,
      .bubble-scroll,
      .bubble-hint {
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        line-height: 1.45;
      }

      .bubble-input,
      .bubble-textarea {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
      }

      .bubble-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .bubble-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.94);
        cursor: pointer;
      }

      .bubble-hint {
        color: rgba(255, 211, 0, 0.92);
      }

      .bubble-scroll {
        overflow-y: auto;
        overflow-x: hidden;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .bubble-context {
        max-height: 220px;
      }

      .bubble-answer {
        flex: 1;
        min-height: 180px;
        max-height: 520px;
      }

      .bubble-textarea {
        min-height: 58px;
        resize: none;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/bubble.tsx"></script>
  </body>
</html>
