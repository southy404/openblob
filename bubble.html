<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' ipc: http://ipc.localhost; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion Bubble</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        --text-main: rgba(236, 243, 255, 0.96);
        --text-soft: rgba(191, 206, 232, 0.82);
        --text-dim: rgba(191, 206, 232, 0.56);

        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-bg-soft: rgba(255, 255, 255, 0.035);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-border-strong: rgba(255, 255, 255, 0.14);

        --shadow-xl: 0 24px 80px rgba(0, 0, 0, 0.38);
        --shadow-soft: 0 10px 30px rgba(62, 106, 214, 0.14);

        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 20px;
        --radius-xl: 28px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
      }

      body {
        background: transparent;
        color: var(--text-main);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        outline: none;
      }

      input,
      textarea {
        outline: none;
        color: var(--text-main);
      }

      textarea {
        resize: none;
      }

      .bubble-window-shell {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 18px;
        box-sizing: border-box;
        background: transparent;
      }

      .bubble-window-card {
        width: min(1100px, calc(100vw - 24px));
        min-height: 280px;
        max-height: calc(100vh - 28px);
        border-radius: var(--radius-xl);
        padding: 16px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;

        background: linear-gradient(
          180deg,
          rgba(18, 24, 38, 0.78),
          rgba(10, 14, 24, 0.72)
        );
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: var(--shadow-xl), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
      }

      .bubble-window-card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
            circle at top left,
            rgba(120, 170, 255, 0.14),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(153, 110, 255, 0.12),
            transparent 24%
          );
      }

      .glass-section {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-lg);
        padding: 12px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .glass-input {
        width: 100%;
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-main);
        padding: 12px 14px;
        box-sizing: border-box;
        outline: none;
        font-size: 13px;
        transition: border-color 0.16s ease, background 0.16s ease,
          box-shadow 0.16s ease;
      }

      .glass-input::placeholder {
        color: var(--text-dim);
      }

      .glass-input:focus {
        border-color: rgba(140, 180, 255, 0.3);
        background: rgba(255, 255, 255, 0.055);
        box-shadow: 0 0 0 4px rgba(117, 163, 255, 0.08);
      }

      .glass-scroll {
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
      }

      .glass-scroll::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .glass-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .glass-scroll::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .bubble-drag-region {
        -webkit-app-region: drag;
      }

      .bubble-no-drag,
      .bubble-no-drag * {
        -webkit-app-region: no-drag;
      }

      .bubble-root-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto auto auto auto;
        gap: 12px;
        height: 100%;
      }

      .bubble-topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .bubble-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 42px;
        padding: 0 4px;
      }

      .bubble-brand-icon {
        width: 40px;
        height: 40px;
        border-radius: 14px;
        background: linear-gradient(
          180deg,
          rgba(126, 167, 255, 0.24),
          rgba(126, 167, 255, 0.08)
        );
        border: 1px solid rgba(146, 184, 255, 0.24);
        display: grid;
        place-items: center;
        box-shadow: 0 10px 30px rgba(78, 117, 217, 0.24);
        flex-shrink: 0;
      }

      .bubble-brand-title {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .bubble-brand-subtitle {
        font-size: 12px;
        opacity: 0.62;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bubble-toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .top-ghost-button {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        cursor: pointer;
        transition: background 0.16s ease, transform 0.16s ease,
          border-color 0.16s ease;
      }

      .top-ghost-button:hover {
        background: rgba(255, 255, 255, 0.085);
        border-color: rgba(255, 255, 255, 0.14);
      }

      .top-ghost-button:active {
        transform: scale(0.985);
      }

      .bubble-label {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.82;
        margin-bottom: 8px;
        letter-spacing: 0.2px;
      }

      .bubble-context-box,
      .bubble-answer-box {
        border-radius: var(--radius-md);
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .bubble-context-box {
        max-height: 88px;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(238, 244, 255, 0.88);
      }

      .bubble-answer-box {
        min-height: 138px;
        max-height: 220px;
        font-size: 13px;
        line-height: 1.55;
        color: rgba(238, 244, 255, 0.92);
      }

      .bubble-composer textarea {
        min-height: 112px;
        max-height: 112px;
        line-height: 1.5;
        border: none;
        box-shadow: none;
        padding: 0;
        background: transparent;
        font-size: 18px;
        resize: none;
      }

      .bubble-composer textarea:focus {
        border: none;
        box-shadow: none;
        background: transparent;
      }

      .bubble-bottom-row {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .bubble-actions-left,
      .bubble-actions-right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .bottom-icon-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.04)
        );
        color: var(--text-main);
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.16s ease, transform 0.16s ease,
          border-color 0.16s ease;
      }

      .bottom-icon-button:hover {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.11),
          rgba(255, 255, 255, 0.05)
        );
      }

      .bottom-icon-button:active {
        transform: scale(0.985);
      }

      .bottom-ghost-chip,
      .primary-pill,
      .mini-flat-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        transition: background 0.16s ease, transform 0.16s ease,
          border-color 0.16s ease;
      }

      .bottom-ghost-chip {
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        font-size: 13px;
        font-weight: 700;
      }

      .bottom-ghost-chip:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .bottom-ghost-chip:active {
        transform: scale(0.985);
      }

      .primary-pill {
        height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid rgba(140, 180, 255, 0.24);
        background: linear-gradient(
          180deg,
          rgba(117, 163, 255, 0.24),
          rgba(117, 163, 255, 0.12)
        );
        color: var(--text-main);
        font-size: 13px;
        font-weight: 800;
        box-shadow: var(--shadow-soft);
      }

      .primary-pill:hover {
        border-color: rgba(140, 180, 255, 0.32);
        background: linear-gradient(
          180deg,
          rgba(117, 163, 255, 0.28),
          rgba(117, 163, 255, 0.14)
        );
      }

      .primary-pill:active {
        transform: scale(0.985);
      }

      .mini-flat-button {
        height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-main);
        font-size: 12px;
        font-weight: 700;
      }

      .mini-flat-button:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      .mini-flat-button:active {
        transform: scale(0.985);
      }

      .bubble-footer {
        margin-top: 2px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .bubble-hint {
        font-size: 12px;
        opacity: 0.72;
        min-height: 18px;
      }

      .bubble-shortcut {
        font-size: 11px;
        opacity: 0.48;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/windows/bubble/app.tsx"></script>
  </body>
</html>
